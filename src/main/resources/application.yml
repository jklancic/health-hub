server:
  port: 8080

spring:
  application:
    name: PharmaDataHub
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pharmadatahub}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000} # 24 hours in milliseconds

rate:
  limit:
    auth:
      capacity: 10 # Maximum requests allowed
      refill-minutes: 1 # Time window in minutes
    api:
      capacity: 500 # Maximum requests allowed
      refill-minutes: 1 # Time window in minutes

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    com.pharmadatahub: INFO
    org.springframework.security: WARN
